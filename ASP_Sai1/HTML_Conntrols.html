<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>HTML Tags</title>
</head>
<body>
    <h1>HTML Controls show case</h1>
    <section>
        <h2>Text inputs </h2>
        <label for="text">Text : </label> 
        <input type="text" id="textname" placeholder="Enter text here" name="text" /><br /><br />
        <label for="text">Email </label>
        <input  type="text" id="textemail" placeholder="Enter Email here" name="text"/><br /><br />
        <label for="text">Phone Number</label>
        <input type="text" id="textpwd" placeholder="Enter password here" name="text" /><br /><br />
    </section>

    <section>
        <h2>Buttons</h2>
         <button type="button" id="btnSubmit">Submit</button>
         <button type="reset" id="btnReset">Reset</button>
    </section>

    <section>
        <h2>CheckBox</h2>
        <input type="checkbox"  id="vechile1" name="vechile1" value="Bike"/>
        <label for="vechile1">I have a bike</label>
        <input type="checkbox" id="vechile2" name="vechile2" value="Car"/>
        <label for="vechile2">I have a car</label>
        <input type="checkbox" id="vechile3" name="vechile3" value="Boat" />
        <label for="Vechile3">I have a boat</label>
    </section>

    <section>
        <h2>Radio Buttons</h2>
        <input type="radio" name="gender" value="Male" />Male <br />
        <input  type="radio" name="gender" value="Female"/>Female <br />
    </section>

</body>
</html>
